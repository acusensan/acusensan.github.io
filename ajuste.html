<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>./Acu</title>
    <link rel="stylesheet" href="css/materialize.min.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000; /* Ensure it stays above other elements */
            }
        main {
            flex: 1 0 auto;
            padding-top: 64px;
        }
        .card {
            margin: 10px;
            cursor: pointer; /* Add cursor pointer for better UX */
        }
        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }
        .menu-button .bar {
            display: block;
            width: 25px;
            height: 3px;
            margin: 5px auto;
            background-color: #fff;
        }
        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <!-- Side Navigation -->
    <ul id="slide-out" class="sidenav">
        <li><div class="user-view">
            <div class="background">
                <img src="img/background.jpg">
            </div>
            <a href="#user"><img class="circle" src="img/user.jpg"></a>
            <a href="#name"><span class="white-text name">Logo Text</span></a>
        </div></li>
        <li><a href="index.html">Home</a></li>
        <li><a href="ajuste.html">Ajuste</a></li>
        <li><a href="barcode.html">Generar Codigo De Barrar</a></li>
        <li><a href="hilos.html">Hilos</a></li>
        <li><a href="partescompradas.html">Partes Compradas</a></li>
        <li><a href="reglatres.html">Regla De Tres</a></li>
        <li><a href="toolcrib.html">Tool Crib</a></li>
        <li><a href="game.html">Game</a></li>
        <li><a href="verificacion.html">Verificacion</a></li>

    </ul>

    <!-- Toolbar -->
    <nav>
        <div class="nav-wrapper blue darken-4">
            <button class="menu-button sidenav-trigger" data-target="slide-out">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <a href="#" class="brand-logo"><code>./Acu</code></a>
            <ul class="right">
                <li><a href="#settings-modal" class="modal-trigger">Settings</a></li>
            </ul>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h4>Settings</h4>
            <p>
                <label>
                    <input type="checkbox" id="dark-mode-toggle" />
                    <span>Dark Mode</span>
                </label>
            </p>
        </div>
        <div class="modal-footer">
            <a href="#!" class="modal-close waves-effect waves-green btn-flat">Close</a>
        </div>
    </div>

    <!-- Main Content -->
    <main>
     <div class="container">
        <div id="selected-items" class="card-panel blue lighten-2 white-text"></div>
        <ul id="entry-list" class="collection"></ul> <!-- New list element -->
        <div class="input-field">
            <label for="section"></label>
            <select id="section" class="browser-default" onchange="updateRackOptions(); updateSelectedItems()">
                <option value="Rack 1">Rack 1</option>
                <option value="Rack 2">Rack 2</option>
                <option value="Rack 3">Rack 3</option>
            </select>
        </div>
        <div class="input-field">
            <label for="rack"></label>
            <select id="rack" class="browser-default" onchange="updateSelectedItems()">
                <!-- Options will be added by JavaScript -->
            </select>
        </div>
        <div class="nav-buttons">
            <button class="btn blue waves-effect waves-light" onclick="changeRack(-1)">◀</button>
            <button class="btn blue waves-effect waves-light" onclick="changeRack(1)">▶</button>
        </div>
        <div class="input-field">
            <label for="menu2"></label>
            <select id="menu2" class="browser-default" onchange="updateMenu3(); updateSelectedItems()">
                <option value="BT1">BT1</option>
                <option value="COLORADO">COLORADO</option>
                <option value="FIX">FIX-STORAGE</option>
                <option value="SUV">SUV</option>
                <option value="SAVANA">SAVANA</option>
                <option value="MISC">MISC</option>
                <option value="VELCRO">VELCRO</option>
                <option value="ZIPPER">ZIPPER</option>
            </select>
        </div>
        <div class="input-field">
            <label for="menu3"></label>
            <select id="menu3" class="browser-default" onchange="updateSelectedItems()">
                <!-- Options will be added by JavaScript based on Menu 2 selection -->
            </select>
        </div>
        <div class="input-field">
            <input type="number" id="quantity" min="1" class="validate">
            <label for="quantity">Cantidad</label>
        </div>
        <button class="btn blue waves-effect waves-light" onclick="downloadData()">Descargar</button>
        <button class="btn blue waves-effect waves-light" onclick="addEntry()">Agregar</button> <!-- New button -->
        
    </div>
    </main>

    <!-- Footer -->
    <footer class="page-footer blue darken-4" style="text-align: center;">
    <div class="footer-copyright">
        <div class="container">
            © <span id="current-year"></span> ./Acu
        </div>
    </div>

    <script src="js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            M.Sidenav.init(document.querySelectorAll('.sidenav'));
            M.Modal.init(document.querySelectorAll('.modal'));

            // Update the copyright year
            document.getElementById('current-year').textContent = new Date().getFullYear();

            // Dark mode toggle
            const darkModeToggle = document.getElementById('dark-mode-toggle');
            darkModeToggle.addEventListener('change', function() {
                document.body.classList.toggle('dark-mode', darkModeToggle.checked);
            });

            // Load saved theme
            if (localStorage.getItem('dark-mode') === 'true') {
                document.body.classList.add('dark-mode');
                darkModeToggle.checked = true;
            }

            // Save theme preference
            darkModeToggle.addEventListener('change', function() {
                localStorage.setItem('dark-mode', darkModeToggle.checked);
            });

            // Add click event to cards to navigate to different pages
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', function() {
                    const link = card.getAttribute('data-link');
                    if (link) {
                        window.location.href = link;
                    }
                });
            });
        });
        document.addEventListener('DOMContentLoaded', function() {
    var elems = document.querySelectorAll('input');
    M.updateTextFields(); // Initialize the input fields
    });

        // Initialize the sidenav
    document.addEventListener('DOMContentLoaded', function() {
      var elems = document.querySelectorAll('.sidenav');
      var instances = M.Sidenav.init(elems);
    });
        document.addEventListener('DOMContentLoaded', function() {
            updateRackOptions();
        });

        function updateRackOptions() {
            const section = document.getElementById('section').value;
            const rackSelect = document.getElementById('rack');
            rackSelect.innerHTML = ''; // Clear previous options

            let start, end;
            switch (section) {
                case 'Rack 1':
                    start = 121;
                    end = 140;
                    break;
                case 'Rack 2':
                    start = 221;
                    end = 240;
                    break;
                case 'Rack 3':
                    start = 303;
                    end = 304;
                    break;
            }

            for (let i = start; i <= end; i++) {
                const option = document.createElement('option');
                option.value = `APC0${i}`;
                option.text = `APC0${i}`;
                rackSelect.appendChild(option);
            }
        }

        function changeRack(direction) {
            const rackSelect = document.getElementById('rack');
            let selectedIndex = rackSelect.selectedIndex;
            selectedIndex += direction;
            if (selectedIndex >= 0 && selectedIndex < rackSelect.options.length) {
                rackSelect.selectedIndex = selectedIndex;
                updateSelectedItems();
            }
        }

        function updateSelectedItems() {
            const section = document.getElementById('section').value;
            const rack = document.getElementById('rack').value;
            const menu2 = document.getElementById('menu2').value;
            const menu3 = document.getElementById('menu3').value;
            const quantity = document.getElementById('quantity').value;
            const selectedItems = `${section}, ${rack}, ${menu2}, ${menu3}, ${quantity}`;
            document.getElementById('selected-items').innerText = selectedItems;
}

        function addEntry() {
            const section = document.getElementById('section').value;
            const rack = document.getElementById('rack').value;
            const menu2 = document.getElementById('menu2').value;
            const menu3 = document.getElementById('menu3').value;
            const quantity = document.getElementById('quantity').value;
            const selectedItems = `${rack} ${menu3} ${quantity}`;

            const entryList = document.getElementById('entry-list');
            const newEntry = document.createElement('li');
            newEntry.className = 'collection-item';
            newEntry.innerText = selectedItems;
            entryList.insertBefore(newEntry, entryList.firstChild); // Add new entry at the top
        }


        function downloadData() {
    const entryList = document.getElementById('entry-list');
    let entries = '';
    for (let i = 0; i < entryList.children.length; i++) {
        entries += entryList.children[i].innerText + '\n';
    }

    const now = new Date();
    const formattedDate = now.toISOString().slice(0, 10);
    const formattedTime = now.toTimeString().slice(0, 8).replace(/:/g, '-');
    const filename = `selected-items_${formattedDate}_${formattedTime}.txt`;

    const blob = new Blob([entries], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
    </script>
</body>
</html>
