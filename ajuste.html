    <div class="container">
        <!-- Table to display input data -->
        <table id="dataTable" class="striped">
            <thead>
                <tr>
                    <th>Rack Section</th>
                    <th>Part Number</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be inserted here -->
            </tbody>
        </table>

        <form onsubmit="addDataToTable(event)">
            <div class="input-field">
                <!-- Rack Number Selection -->
                <label for="rack"></label>
                <select id="rack" name="rack" class="browser-default" onchange="updateRackOptions()">
                    <option value="">Select Rack</option>
                    <option value="rack1">Rack 1</option>
                    <option value="rack2">Rack 2</option>
                    <option value="rack3">Rack 3</option>
                </select>
            </div>

            <div class="input-field">
                <!-- Rack Section Selection -->
                <label for="part"></label>
                <select id="part" name="part" class="browser-default">
                    <option value="">Select Rack Section</option>
                </select>
            </div>

            <div class="input-field">
                <!-- Part Type Selection -->
                <label for="partType"></label>
                <select id="partType" name="partType" class="browser-default" onchange="updatePartNumberOptions()">
                    <option value="">Select Part Type</option>
                    <option value="PCGREARS">PCGREARS</option>
                    <option value="PCGSAVAN">PCGSAVAN</option>
                    <option value="PCGBT1CC">PCGBT1CC</option>
                    <option value="PCG31XX">PCG31XX</option>
                </select>
            </div>

            <div class="input-field">
                <!-- Part Number Selection -->
                <label for="partNumber"></label>
                <select id="partNumber" name="partNumber" class="browser-default">
                    <option value="">Select Part Number</option>
                </select>
            </div>

            <div class="input-field">
                <!-- Quantity Input -->
                <label for="quantity"></label>
                <input type="number" id="quantity" name="quantity" min="1">
            </div>

            <button type="submit" class="btn">Submit</button>
        </form>

        <button onclick="downloadData()" class="btn">Download Data</button>
    </div>

    <!-- Materialize JS -->
    <script src="js/materialize.min.js"></script>
    <script src="js/ajuste.js"></script>
</body>
</html>
