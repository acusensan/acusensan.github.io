<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Delivery Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        #game {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 10px;
            margin-top: 20px;
        }

        .room {
            width: 100px;
            height: 100px;
            background-color: lightgray;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        #status {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="game">
        <div class="room" id="room1"></div>
        <div class="room" id="room2"></div>
        <div class="room" id="room3"></div>
        <div class="room" id="room4"></div>
        <div class="room" id="room5"></div>
        <div class="room" id="room6"></div>
    </div>
    <div id="status">
        <p>Vidas: <span id="lives">3</span></p>
        <p>Timpo: <span id="time">60</span> segundos</p>
        <p>Puntos: <span id="score">0</span></p>
        <p>Record: <span id="record">0</span></p>
    </div>
    <script>
        let lives = 3;
        let time = 60;
        let score = 0;
        let record = localStorage.getItem('record') || 0;
        let activeRoom = null;
        let gameInterval;
        let intervalTime = 1000;

        const rooms = document.querySelectorAll('.room');
        const livesDisplay = document.getElementById('lives');
        const timeDisplay = document.getElementById('time');
        const scoreDisplay = document.getElementById('score');
        const recordDisplay = document.getElementById('record');

        recordDisplay.textContent = record;

        function startGame() {
            gameInterval = setInterval(() => {
                if (time > 0) {
                    time--;
                    timeDisplay.textContent = time;
                    if (activeRoom) {
                        activeRoom.style.backgroundColor = 'lightgray';
                    }
                    activeRoom = rooms[Math.floor(Math.random() * rooms.length)];
                    activeRoom.style.backgroundColor = 'yellow';
                    if (intervalTime > 200) {
                        intervalTime -= 10; // Decrease interval time to make the game faster
                        clearInterval(gameInterval);
                        startGame();
                    }
                } else {
                    clearInterval(gameInterval);
                    alert('Time is up! You lose.');
                    updateRecord();
                }
            }, intervalTime);
        }

        function handleRoomInteraction(room) {
            if (room === activeRoom) {
                room.style.backgroundColor = 'lightgray';
                activeRoom = null;
                score++;
                scoreDisplay.textContent = score;
            } else {
                lives--;
                livesDisplay.textContent = lives;
                if (lives === 0) {
                    clearInterval(gameInterval);
                    alert('You are out of lives! Game over.');
                    updateRecord();
                }
            }
        }

        function updateRecord() {
            if (score > record) {
                record = score;
                localStorage.setItem('record', record);
                recordDisplay.textContent = record;
            }
        }

        rooms.forEach(room => {
            room.addEventListener('click', () => handleRoomInteraction(room));
            room.addEventListener('touchstart', () => handleRoomInteraction(room));
        });

        startGame();
    </script>
</body>
</html>
