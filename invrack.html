        .flex-container {
            display: flex;
            gap: 5px; /* Adjust the gap between elements as needed */
        }
        .input-field {
            flex: .5; /* Adjust the flex property as needed */
        }
        .right-align-input {

            width: 150px; /* Adjust as needed */
        }
        .dropdown-content li>a, .dropdown-content li>span {
        font-size: 16px;
        color: black;
        display: block;

        padding: 14px 16px;
}
        @media (max-width: 600px) {
        .nav-buttons,
        .nav-actions {
          display: flex;
          gap: 8px;
      }
        .nav-buttons .btn,
        .nav-actions .btn {
          flex: 1 1 0;
          width: 100%;
        }
        .input-field {
            flex: 1; /* Adjust the flex property as needed */

}

    }

  <!-- ==== TOP NAVIGATION BAR ==== -->
  <nav class="blue darken-4">
    <div class="nav-wrapper">

      <!-- Menu Trigger -->
      <button class="menu-button sidenav-trigger" data-target="slide-out">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <!-- Brand -->
      <a href="#" class="brand-logo"><code>Inventario</code></a>

      <!-- Actions -->
      <ul class="right">
        <li>
          <a href="#settings-modal" class="modal-trigger">
            <img src="icons/settings.svg" alt="Settings" class="nav-icon">
          </a>
        </li>
      </ul>
    </div>
  </nav>


  <!-- ==== SETTINGS MODAL ==== -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">

      <h4>Ajustes</h4>

      <!-- Dark Mode -->
      <div class="card">
        <div class="card-content">
          <span class="card-title">Modo Oscuro</span>
          <label>
            <input type="checkbox" id="dark-mode-toggle">
            <span>Modo Oscuro</span>
          </label>
        </div>
      </div>

      <div class="card">
        <div class="card-content">
          <span class="card-title">Descargar Archivo</span>
          <button class="btn blue waves-effect waves-light " onclick="downloadCSV()">Dsecargar</button>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <span class="card-title">Resetear Inventario</span>
          <button class="btn red waves-effect waves-light" onclick="resetData()">Limpiar</button>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="modal-close btn grey waves-effect waves-light">Cerrar</button>
    </div>
  </div>

    <!-- Main Content -->
    <main>
        <div class="container" style="padding-bottom: 40px; padding-top: 20px;">
            <div class="flex-container">
            <div class="input-field">
                <select id="columnSelect" onchange="updateRacks()">
                    <option value="" disabled selected>---Seleciona---</option>
                    <option value="APC01">Rack 1</option>
                    <option value="APC02">Rack 2</option>
                </select>
                <label>Rack Principal</label>
            </div>
            <div class="input-field">
                <select id="rackSelect">
                    <!-- Options will be populated by JavaScript -->
                </select>
                <label>Seleciona Rack</label>
            </div>
            </div>
            <div class="nav-buttons col s6 center-align">
                <button class="btn blue" onclick="prevRack()">Anterior</button>
                <button class="btn blue" onclick="nextRack()">Proximo</button>
            </div>
            <div id="itemDisplay" class="section">
                <!-- Item details will be displayed here -->
            </div>
            <div class="nav-buttons col s6 center-align">
                <button class="btn blue" onclick="prevRack()">Anterior</button>
                <button class="btn blue" onclick="nextRack()">Proximo</button>
            </div>
        </div>
    
    </main>
