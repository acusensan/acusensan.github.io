  <style>
  body {
    background: #f4f6f8;
  }
  .card-title {
    font-weight: 600;
  }

  .info-line {
    margin: 6px 0;
  }

  /* Scrollable */
  .history-box {
    max-height: 500px;   /* adjust height if needed */
    overflow-y: auto;
  }
  @media (max-width: 500px) {
        nav .brand-logo {
        position: absolute;
        color: #fff;
        display: inline-block;
        font-size: 1.5rem;
        padding: 0;
}
}
  </style>
</head>
<body>
     <!-- ==== SIDE NAVIGATION ==== -->
  <ul id="slide-out" class="sidenav">
    <li><a href="index.html">Home</a></li>
    <li><a href="ajuste.html">Ajuste</a></li>
    <li><a href="invrack.html">Inventario Racks</a></li>

    <li><a href="table.html">Verificar</a></li>
    <li><a href="hilos.html">Hilos</a></li>
    <li><a href="barcode.html">Generar Código de Barras</a></li>
    <li><a href="reglatres.html">Regla de Tres</a></li>
    <li><a href="scan.html">Escaneo</a></li>
  </ul>


  <!-- ==== TOP NAVIGATION BAR ==== -->
  <nav class="blue darken-4">
    <div class="nav-wrapper">

      <!-- Menu Trigger -->
      <button class="menu-button sidenav-trigger" data-target="slide-out">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <!-- Brand -->
      <a href="#" class="brand-logo"><code>Regla De Tres</code></a>

      <!-- Actions -->
      <ul class="right">
        <li>
          <a href="#settings-modal" class="modal-trigger">☀</a>
        </li>
      </ul>
    </div>
  </nav>


  <!-- ==== SETTINGS MODAL ==== -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">

      <h4>Ajustes</h4>

      <!-- Dark Mode -->
      <div class="card">
        <div class="card-content">
          <span class="card-title">Tema</span>
          <label>
            <input type="checkbox" id="dark-mode-toggle">
            <span>Modo Oscuro</span>
          </label>
        </div>
      </div>

      <div class="card">
        <div class="card-content">
          <span class="card-title">Descargar Archivo</span>
          <button class="btn blue waves-effect waves-light" onclick="downloadHistory()">Descargar</button>
        </div>
      </div>

      <div class="card">
        <div class="card-content">
          <span class="card-title">Resetear Regla De Tres</span>
          <button class="btn red waves-effect waves-light" onclick="clearHistory()" style="margin-left: 10px;">Limpiar</button>
        </div>
      </div>
    </div>


    <div class="modal-footer">
      <button class="modal-close btn grey waves-effect waves-light">Cerrar</button>
    </div>
  </div>


    <!-- Main Content -->
    <main>
      <div class="container">

  <div class="row">
    <div class="col s12 m8 offset-m2">
      <div class="card">
        <div class="card-content">
          <span class="card-title center">Regla de Tres</span>

          <!-- Tipo -->
          <div class="input-field">
            <select id="tipo">
              <option value="" disabled selected>Selecione tipo</option>
            </select>
            <label>Tipo</label>
          </div>

          <!-- Numero de Parte -->
          <div class="input-field">
            <select id="parte">
              <option value="" disabled selected>Selecione parte</option>
            </select>
            <label>Número de Parte</label>
          </div>

          <!-- Info -->
          <div id="info" class="grey-text text-darken-2"></div>

          <!-- User input -->
          <div class="input-field">
            <input type="number" id="userInput">
            <label for="userInput">Cantidad</label>
          </div>

          <!-- Button -->
          <div class="center">
            <button class="btn blue waves-effect waves-light" onclick="calcular()">
              Calcular
            </button>
          </div>

          <!-- Result -->
          <h5 id="resultado" class="center green-text"></h5>
        </div>
      </div>
    </div>
  </div>
<div class="row">
  <div class="col s12 m8 offset-m2">
    <div class="card">
      <div class="card-content">
        <span class="card-title center">Resultados Guardados</span>

        <!-- Scrollable container -->
        <div id="history" class="history-box section"></div>
      </div>
    </div>
  </div>
</div>

    </main>

     <!-- ==== FOOTER ==== -->
  <footer class="page-footer blue darken-4 center-align">

      </div>
    </div>
  </footer>

</body>
</html>
