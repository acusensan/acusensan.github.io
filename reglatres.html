<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regla De Tres</title>
    <link rel="stylesheet" href="css/materialize.min.css">
    <link rel="stylesheet" href="css/navigationbar.css">
    <style>
        .input-field label {
            color: #9e9e9e;
        }
        .input-field input[type=number]:focus + label {
            color: #42a5f5;
        }
        .input-field input[type=number]:focus {
            border-bottom: 1px solid #42a5f5;
            box-shadow: 0 1px 0 0 #42a5f5;
        }
        .input-field input[type=number].valid {
            border-bottom: 1px solid #4caf50;
            box-shadow: 0 1px 0 0 #4caf50;
        }
        .input-field input[type=number].invalid {
            border-bottom: 1px solid #f44336;
            box-shadow: 0 1px 0 0 #f44336;
        }
    </style>
</head>
<body>
    <!-- Side Navigation -->
    <ul id="slide-out" class="sidenav">
        <li><a href="index.html">Home</a></li>
        <li><a href="ajuste.html">Ajuste</a></li>
        <li><a href="barcode.html">Generar Codigo De Barrar</a></li>
        <li><a href="hilos.html">Hilos</a></li>
        <li><a href="invrack.html">Inventario Racks</a></li>
        <li><a href="partescompradas.html">Partes Compradas</a></li>
        <li><a href="reglatres.html">Regla De Tres</a></li>
        <!-- <li><a href="verificacion.html">Verificacion</a></li>-->
        <!-- <li><a href="verificacion.html">Verificacion</a></li>-->
    </ul>

    <!-- Toolbar -->
    <nav>
        <div class="nav-wrapper blue darken-4">
            <button class="menu-button sidenav-trigger" data-target="slide-out">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <a href="#" class="brand-logo"><code>Regla De Tres</code></a>
            <ul class="right">
                <li><a href="#settings-modal" class="modal-trigger">Settings</a></li>
            </ul>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h4>Settings</h4>
            <p>
                <label>
                    <input type="checkbox" id="dark-mode-toggle" />
                    <span>Dark Mode</span>
                </label>
            </p>
        </div>
        <div class="modal-footer">
            <a href="#!" class="modal-close waves-effect waves-green btn-flat">Close</a>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <div class="container">
            <div class="row">
                <form class="col s12">
                    <div class="row">
                        <div class="col s12 center-align">
                            <h5 id="result"></h5>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="input1" type="number" class="validate">
                            <label for="input1">Peso De Muestra</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="input2" type="number" class="validate">
                            <label for="input2">Cantidad De Muestras</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="input3" type="number" class="validate">
                            <label for="input3">Peso Total</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col s12 center-align">
                            <button class="btn red waves-effect waves-light" type="button" onclick="clearFields()">Limpiar</button>
                            <button class="btn blue waves-effect waves-light" type="button" onclick="calculate()">Calcular</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="page-footer blue darken-4" style="text-align: center;">
        <div class="footer-copyright">
            <div class="container">
                © <span id="current-year"></span> ./Acu
            </div>
        </div>
    </footer>

    <script src="js/materialize.min.js" defer></script>
    <script src="js/navigationbar.js" defer></script>
    <script src="js/reglatres.js" defer></script>
</body>
</html>
