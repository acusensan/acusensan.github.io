    <div class="container">
        <h1 class="center-align">Generar Codigo</h1>
        <div class="input-field">
            <input type="text" id="barcodeInput" placeholder="Introducir Datos">
        </div>
        <div class="center-align">
            <button class="btn waves-effect waves-light" onclick="prependAndGenerate('S')">S (Serial)</button>
            <button class="btn waves-effect waves-light" onclick="prependAndGenerate('P')">P (Numero De Parte)</button>
            <button class="btn waves-effect waves-light" onclick="prependAndGenerate('Q')">Q (Cantidad)</button>
        </div>
        <div class="center-align">
            <svg id="barcode"></svg>
        </div>
    </div>

    <script>
        // Initialize the sidenav
    document.addEventListener('DOMContentLoaded', function() {
      var elems = document.querySelectorAll('.sidenav');
      var instances = M.Sidenav.init(elems);
    });
        function prependAndGenerate(letter) {
            var input = document.getElementById('barcodeInput');
            input.value = letter + input.value;
            generateBarcode();
        }

        function generateBarcode() {
            var input = document.getElementById('barcodeInput').value;
            JsBarcode("#barcode", input, {
                format: "CODE128",
                displayValue: true
            });
        }
    </script>
