    <style>
        td, th {
            padding: 10px 2px;
            text-align: center;
        }
        #modalImage {
        max-width: 100%;
        width: 100%;
        height: auto;
        display: block;
      }

      .copy-hint {
        text-align: center;
        font-size: 0.9rem;
        color: #555;
        margin-top: 8px;
      }

      .barcode-container {
        width: 100%;
        overflow: hidden;
      }
      /* Ensure modal never exceeds viewport */
      .modal {
        max-height: 90vh !important;
        height: auto;
      }

      /* Make content scroll internally */
      .modal-content {
        max-height: calc(90vh - 56px); /* space for footer */
        overflow-y: auto;
      }

      /* Keep footer always visible */
      .modal-footer {
        position: sticky;
        bottom: 0;
        background: white;
        z-index: 10;
        border-top: 1px solid #ddd;
      }
        @media (max-width: 500px) {
        td, th {
            padding: 10px 2px;
            text-align: center;
        }
        nav .brand-logo {
        position: absolute;
        color: #fff;
        display: inline-block;
        font-size: 1.5rem;
        padding: 0;
}
}
