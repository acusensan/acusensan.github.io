    <div class="container">
        <div id="selected-items" class="card-panel teal lighten-2 white-text"></div>
        <ul id="entry-list" class="collection"></ul> <!-- New list element -->
        <div class="input-field">
            <label for="section"></label>
            <select id="section" class="browser-default" onchange="updateRackOptions(); updateSelectedItems()">
                <option value="Rack 1">Rack 1</option>
                <option value="Rack 2">Rack 2</option>
                <option value="Rack 3">Rack 3</option>
            </select>
        </div>
        <div class="input-field">
            <label for="rack"></label>
            <select id="rack" class="browser-default" onchange="updateSelectedItems()">
                <!-- Options will be added by JavaScript -->
            </select>
        </div>
        <div class="nav-buttons">
            <button class="btn waves-effect waves-light" onclick="changeRack(-1)">◀</button>
            <button class="btn waves-effect waves-light" onclick="changeRack(1)">▶</button>
        </div>
        <div class="input-field">
            <label for="menu2"></label>
            <select id="menu2" class="browser-default" onchange="updateMenu3(); updateSelectedItems()">
                <option value="BT1">BT1</option>
                <option value="COLORADO">COLORADO</option>
                <option value="FIX">FIX-STORAGE</option>
                <option value="SUV">SUV</option>
                <option value="SAVANA">SAVANA</option>
                <option value="MISC">MISC</option>
                <option value="VELCRO">VELCRO</option>
                <option value="ZIPPER">ZIPPER</option>
            </select>
        </div>
        <div class="input-field">
            <label for="menu3"></label>
            <select id="menu3" class="browser-default" onchange="updateSelectedItems()">
                <!-- Options will be added by JavaScript based on Menu 2 selection -->
            </select>
        </div>
        <div class="input-field">
            <input type="number" id="quantity" min="1" class="validate">
            <label for="quantity">Quantity</label>
        </div>
        <button class="btn waves-effect waves-light" onclick="addEntry()">Agregar</button> <!-- New button -->
        <button class="btn waves-effect waves-light" onclick="downloadData()">Descargar</button>
    </div>
    <script src="js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    var elems = document.querySelectorAll('input');
    M.updateTextFields(); // Initialize the input fields
    });

        // Initialize the sidenav
    document.addEventListener('DOMContentLoaded', function() {
      var elems = document.querySelectorAll('.sidenav');
      var instances = M.Sidenav.init(elems);
    });
        document.addEventListener('DOMContentLoaded', function() {
            updateRackOptions();
        });

        function updateRackOptions() {
            const section = document.getElementById('section').value;
            const rackSelect = document.getElementById('rack');
            rackSelect.innerHTML = ''; // Clear previous options

            let start, end;
            switch (section) {
                case 'Rack 1':
                    start = 121;
                    end = 140;
                    break;
                case 'Rack 2':
                    start = 221;
                    end = 240;
                    break;
                case 'Rack 3':
                    start = 303;
                    end = 304;
                    break;
            }

            for (let i = start; i <= end; i++) {
                const option = document.createElement('option');
                option.value = `APC0${i}`;
                option.text = `APC0${i}`;
                rackSelect.appendChild(option);
            }
        }

        function changeRack(direction) {
            const rackSelect = document.getElementById('rack');
            let selectedIndex = rackSelect.selectedIndex;
            selectedIndex += direction;
            if (selectedIndex >= 0 && selectedIndex < rackSelect.options.length) {
                rackSelect.selectedIndex = selectedIndex;
                updateSelectedItems();
            }
        }

        function updateMenu3() {
            const menu2 = document.getElementById('menu2').value;
            const menu3 = document.getElementById('menu3');
            menu3.innerHTML = ''; // Clear previous options

            let options = [];
            switch (menu2) {
                case 'BT1':
                    options = ['L001423285NCPAA'];
                    break;
                case 'COLORADO':
                    options = ['L001434100NCPAA'];
                    break;
                case 'FIX':
                    options = ['L001797262NCPAA'];
                    break;
                case 'SUV':
                    options = ['L002194708NCPAA'];
                    break;
                case 'SAVANA':
                    options = ['1561-305SAA'];
                    break;
                case 'MISC':
                    options = ['346779'];
                    break;
                case 'VELCRO':
                    options = ['72918'];
                    break;
                case 'ZIPPER':
                    options = ['255S5-184D'];
                    break;
            }

            options.forEach(optionText => {
                const option = document.createElement('option');
                option.value = optionText;
                option.text = optionText;
                menu3.appendChild(option);
            });
        }

        function updateSelectedItems() {
            const section = document.getElementById('section').value;
            const rack = document.getElementById('rack').value;
            const menu2 = document.getElementById('menu2').value;
            const menu3 = document.getElementById('menu3').value;
            const quantity = document.getElementById('quantity').value;
            const selectedItems = `${section}, ${rack}, ${menu2}, ${menu3}, ${quantity}`;
            document.getElementById('selected-items').innerText = selectedItems;
}

        function addEntry() {
            const section = document.getElementById('section').value;
            const rack = document.getElementById('rack').value;
            const menu2 = document.getElementById('menu2').value;
            const menu3 = document.getElementById('menu3').value;
            const quantity = document.getElementById('quantity').value;
            const selectedItems = `${rack} ${menu3} ${quantity}`;

            const entryList = document.getElementById('entry-list');
            const newEntry = document.createElement('li');
            newEntry.className = 'collection-item';
            newEntry.innerText = selectedItems;
            entryList.insertBefore(newEntry, entryList.firstChild); // Add new entry at the top
        }


        function downloadData() {
    const entryList = document.getElementById('entry-list');
    let entries = '';
    for (let i = 0; i < entryList.children.length; i++) {
        entries += entryList.children[i].innerText + '\n';
    }

    const now = new Date();
    const formattedDate = now.toISOString().slice(0, 10);
    const formattedTime = now.toTimeString().slice(0, 8).replace(/:/g, '-');
    const filename = `selected-items_${formattedDate}_${formattedTime}.txt`;

    const blob = new Blob([entries], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}


    </script>
</body>
